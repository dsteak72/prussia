<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unit Management</title>

<style>
body{
    font-family: Arial;
    background:white;
    color:black;
    padding:30px;
    text-align:center;
}

input, select, button{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#333;
    color:white;
}

th, td{
    border:1px solid #555;
    padding:10px;
}

/* Buttons */
.editBtn{background:orange;}
.saveBtn{background:limegreen;}
.removeBtn{background:crimson;color:white;}

/* Medal panel */
#medalBox{
    display:none;
    border:1px solid black;
    padding:10px;
    max-height:200px;
    overflow-y:auto;
    text-align:left;
    background:white;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>Member Management</h1>

<form id="memberForm">

<input id="username" placeholder="Username" required>

<select id="rank">
<option>Recrut</option>
<option>Soldat</option>
<option>Gemeiner</option>
<option>Gefreiter</option>
<option>Sabsgefreiter</option>
<option>Obergefreiter</option>
<option>Korporal</option>
<option>Sergeant</option>
<option>Unterfeldwebel</option>
<option>Feldwebel</option>
<option>Fänrich</option>
<option>Leutnant</option>
<option>Oberleutnant</option>
<option>Hauptmann</option>
<option>Major</option>
<option>Obertsleutnant</option>
<option>Oberst</option>
<option>Generalmajor</option>
<option>Generalleutnant</option>
<option>Feldmarschall</option>
<option>Chef de Generalstabes</option>
<option>König von Preußen</option>
</select>

<input type="number" id="strikes" placeholder="Strikes" required>

<label>LOA <input type="checkbox" id="loa"></label>
<label>NCO <input type="checkbox" id="nco"></label>

<br>

<button type="button" onclick="toggleMedals()">Select Medals</button>

<div id="medalBox"></div>

<br>

<button type="submit">Add Member</button>

</form>

<table>
<thead>
<tr>
<th>Username</th>
<th>Rank</th>
<th>Strikes</th>
<th>LOA</th>
<th>NCO</th>
<th>Medals</th>
<th>Edit</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="memberTable"></tbody>
</table>

<script>

/* Medal list */
const medalList = [
"Stern zum Großkreuz des Eisernen Kreuzes",
"Pour le merite",
"Eisernes Kreuz 1. Klasse",
"Eisernes Kreuz 2. Klasse",
"Orden des Roten Atlers",
"Militärverdienstkreuz",
"Killstreak 1st class",
"Killstreak 2nd class",
"Killstreak 3rd class",
"Killstreak 4th class",
"Service medal 1st class",
"Service medal 2nd class",
"Service medal 3rd class",
"Service medal 4th class",
"National Mastery of Musket Shooting",
"National Mastery of Bayonet Melee",
"National Mastery of Sabre Melee",
"Orden von Louise",
"Blüchers guarde",
"Kolonialmedaille 1. Klasse",
"Kolonialmedaille 2. Klasse",
"Kolonialmedaille 3. Klasse",
"Kolonialmedaille 4. Klasse",
"Maximilian-Orden"
]

const medalBox = document.getElementById("medalBox")

function buildMedals(selected=[]){
    medalBox.innerHTML = medalList.map(m =>
        `<label><input type="checkbox" value="${m}" ${selected.includes(m)?"checked":""}> ${m}</label><br>`
    ).join("")
}

buildMedals()

function toggleMedals(){
    medalBox.style.display = medalBox.style.display === "block" ? "none" : "block"
}

function getSelectedMedals(container){
    let checked = container.querySelectorAll("input:checked")
    let list=[]
    checked.forEach(c=>list.push(c.value))
    return list
}

/* Table */

const table = document.getElementById("memberTable")

function addRow(u,r,s,l,n,m){

let row=document.createElement("tr")

row.innerHTML=`
<td>${u}</td>
<td>${r}</td>
<td>${s}</td>
<td>${l}</td>
<td>${n}</td>
<td>${m.join(", ")}</td>
<td><button class="editBtn">Edit</button></td>
<td><button class="removeBtn">Remove</button></td>
`

table.appendChild(row)
}

/* Add */

memberForm.addEventListener("submit",e=>{
e.preventDefault()

let medals = getSelectedMedals(medalBox)

addRow(
username.value,
rank.value,
strikes.value,
loa.checked?"Yes":"No",
nco.checked?"Yes":"No",
medals
)

memberForm.reset()
buildMedals()
medalBox.style.display="none"
})

/* Edit */

table.addEventListener("click",e=>{

let row=e.target.closest("tr")
if(!row) return

let cells=row.querySelectorAll("td")

if(e.target.classList.contains("removeBtn")){
row.remove()
}

if(e.target.classList.contains("editBtn")){

let current = cells[5].innerText.split(", ").filter(x=>x)

cells[0].innerHTML=`<input value="${cells[0].innerText}">`
cells[1].innerHTML=`<input value="${cells[1].innerText}">`
cells[2].innerHTML=`<input type="number" value="${cells[2].innerText}">`

cells[3].innerHTML=`<select><option ${cells[3].innerText=="Yes"?"selected":""}>Yes</option><option>No</option></select>`
cells[4].innerHTML=`<select><option ${cells[4].innerText=="Yes"?"selected":""}>Yes</option><option>No</option></select>`

cells[5].innerHTML = medalList.map(m =>
`<label><input type="checkbox" value="${m}" ${current.includes(m)?"checked":""}> ${m}</label><br>`
).join("")

e.target.textContent="Save"
e.target.className="saveBtn"
}

else if(e.target.classList.contains("saveBtn")){

cells[0].textContent=cells[0].querySelector("input").value
cells[1].textContent=cells[1].querySelector("input").value
cells[2].textContent=cells[2].querySelector("input").value
cells[3].textContent=cells[3].querySelector("select").value
cells[4].textContent=cells[4].querySelector("select").value

let medals = getSelectedMedals(cells[5])
cells[5].textContent = medals.join(", ")

e.target.textContent="Edit"
e.target.className="editBtn"
}

})

</script>

</body>
</html>
